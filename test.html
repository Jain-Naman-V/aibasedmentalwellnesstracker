<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCare AI — Visual Unit Test Runner</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;900&family=Space+Mono&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-bg: #faf8f5;
      --color-text-primary: #2b2347;
      --color-text-secondary: #5e548e;
      --color-indigo: #6b66e5;
      --color-indigo-light: #f0efff;
      --color-sage: #52796f;
      --color-sage-light: #e2efe0;
      --color-success: #4ade80;
      --color-danger: #f87171;
      --color-border: rgba(94, 84, 142, 0.12);
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    body { font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text-primary); margin: 0; padding: 2rem; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .test-container { width: 100%; max-width: 800px; background-color: #ffffff; border: 1px solid var(--color-border); border-radius: 16px; box-shadow: 0 8px 30px rgba(94, 84, 142, 0.08); overflow: hidden; }
    .test-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--color-border); background: linear-gradient(to right, rgba(107, 102, 229, 0.03), rgba(82, 121, 111, 0.03)); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .test-header h1 { font-family: var(--font-heading); font-size: 1.75rem; margin: 0; }
    .test-summary-badge { font-family: var(--font-heading); font-weight: 600; padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.9rem; }
    .test-summary-badge.all-passed { background-color: var(--color-sage-light); color: var(--color-sage); }
    .test-summary-badge.has-failed { background-color: #fdd8d8; color: #bf2121; }
    .test-results-list { list-style: none; padding: 0; margin: 0; }
    .test-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 2rem; border-bottom: 1px solid var(--color-border); transition: background-color 0.2s ease; }
    .test-row:last-child { border-bottom: none; }
    .test-row:hover { background-color: #fafafa; }
    .test-meta { display: flex; align-items: center; gap: 0.75rem; }
    .test-status-icon { font-size: 1.1rem; width: 20px; }
    .test-status-icon.pass { color: var(--color-success); }
    .test-status-icon.fail { color: var(--color-danger); }
    .test-name { font-weight: 600; font-size: 0.88rem; }
    .test-time { font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-text-secondary); }
    .test-error-log { background-color: #1a162b; color: var(--color-danger); font-family: var(--font-mono); font-size: 0.75rem; padding: 0.75rem 1.5rem; margin: 0.5rem 2rem; border-radius: 8px; white-space: pre-wrap; }
    .test-section-header { padding: 0.5rem 2rem; background-color: var(--color-indigo-light); font-family: var(--font-heading); font-weight: 700; font-size: 0.8rem; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .footer { margin-top: 2rem; text-align: center; font-size: 0.85rem; color: var(--color-text-secondary); }
    .btn-run { font-family: var(--font-heading); background-color: var(--color-indigo); color: #fff; font-weight: 600; padding: 0.5rem 1.25rem; border-radius: 8px; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(107, 102, 229, 0.2); transition: all 0.2s ease; }
    .btn-run:hover { background-color: #5550c7; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="test-container">
    <div class="test-header">
      <div>
        <h1>Visual Unit Test Suite</h1>
        <p style="margin: 0.25rem 0 0 0; font-size: 0.85rem; color: var(--color-text-secondary);">
          Tests <code>js/helpers.js</code>, <code>js/config.js</code> inside active DOM environment.
        </p>
      </div>
      <div id="test-summary" class="test-summary-badge all-passed">Running...</div>
    </div>
    <ul class="test-results-list" id="test-results-body"></ul>
  </div>

  <div style="margin-top: 1.5rem;">
    <button class="btn-run" id="btn-re-run">Run Tests Again</button>
  </div>

  <div class="footer">MindCare AI • Code Quality & Testing Audit</div>

  <script type="module">
    import { validateUrl, validateJournal, escapeHtml, extractJsonString, parseInlineMarkdown, parseMarkdownToElements, sanitizeJournalInput } from "./js/helpers.js";
    import { EXAMS, getExamName, buildAnalysisPrompt, buildCompanionSystemPrompt } from "./js/config.js";

    const resultsBody = document.getElementById("test-results-body");
    const summaryBadge = document.getElementById("test-summary");
    const runBtn = document.getElementById("btn-re-run");

    let totalTests = 0;
    let failedTests = 0;

    function assert(condition, message) { if (!condition) throw new Error(message || "Assertion failed"); }
    assert.strictEqual = (actual, expected, msg) => { if (actual !== expected) throw new Error(msg || `Expected "${expected}" but got "${actual}"`); };

    function addSectionHeader(title) {
      const li = document.createElement("li");
      li.className = "test-section-header";
      li.textContent = title;
      resultsBody.appendChild(li);
    }

    function addTestResult(name, fn) {
      totalTests++;
      const start = performance.now();
      const li = document.createElement("li");
      li.className = "test-row";
      const meta = document.createElement("div");
      meta.className = "test-meta";
      const icon = document.createElement("span");
      const textSpan = document.createElement("span");
      textSpan.className = "test-name";
      textSpan.textContent = name;
      meta.appendChild(icon);
      meta.appendChild(textSpan);
      const dur = document.createElement("span");
      dur.className = "test-time";
      li.appendChild(meta);
      li.appendChild(dur);
      resultsBody.appendChild(li);

      try {
        fn();
        icon.className = "test-status-icon pass";
        icon.textContent = "✓";
        dur.textContent = `${(performance.now() - start).toFixed(2)} ms`;
      } catch (err) {
        failedTests++;
        icon.className = "test-status-icon fail";
        icon.textContent = "✗";
        dur.textContent = `${(performance.now() - start).toFixed(2)} ms`;
        const errorDiv = document.createElement("div");
        errorDiv.className = "test-error-log";
        errorDiv.textContent = `${err.message}`;
        resultsBody.appendChild(errorDiv);
      }
    }

    function runTests() {
      resultsBody.replaceChildren();
      totalTests = 0;
      failedTests = 0;
      summaryBadge.className = "test-summary-badge";
      summaryBadge.textContent = "Running...";

      addSectionHeader("URL Validation");
      addTestResult("should accept valid HTTP/HTTPS URLs", () => {
        assert.strictEqual(validateUrl("https://api.openai.com/v1"), true);
        assert.strictEqual(validateUrl("http://localhost:11434"), true);
      });
      addTestResult("should reject non-HTTP schemes and empty strings", () => {
        assert.strictEqual(validateUrl("ftp://api.openai.com"), false);
        assert.strictEqual(validateUrl(""), false);
      });

      addSectionHeader("Journal Validation");
      addTestResult("should reject entries under 50 characters", () => {
        assert.strictEqual(validateJournal("Short text."), false);
        assert.strictEqual(validateJournal(""), false);
      });
      addTestResult("should accept entries at boundary (50 chars)", () => {
        assert.strictEqual(validateJournal("a".repeat(50)), true);
        assert.strictEqual(validateJournal("a".repeat(49)), false);
      });

      addSectionHeader("Security: HTML Escaping");
      addTestResult("should neutralize XSS script injection vectors", () => {
        const dangerous = '<script>alert("hack");</' + 'script> & "hello"';
        const expected = '&lt;script&gt;alert(&quot;hack&quot;);&lt;/script&gt; &amp; &quot;hello&quot;';
        assert.strictEqual(escapeHtml(dangerous), expected);
      });

      addSectionHeader("Security: Input Sanitization");
      addTestResult("should strip control characters from journal input", () => {
        assert.strictEqual(sanitizeJournalInput("Hello\x00World\x07"), "HelloWorld");
      });
      addTestResult("should collapse excessive whitespace and newlines", () => {
        assert.strictEqual(sanitizeJournalInput("Hello   World\n\n\n\n\nEnd"), "Hello World\n\nEnd");
      });

      addSectionHeader("JSON Extraction");
      addTestResult("should extract JSON from ```json backtick wrapping", () => {
        assert.strictEqual(extractJsonString("```json\n{\"s\": 45}\n```"), "{\"s\": 45}");
      });
      addTestResult("should extract JSON from conversational wrapping", () => {
        assert.strictEqual(extractJsonString("Here:\n{\"s\": 72}\nDone!"), "{\"s\": 72}");
      });

      addSectionHeader("Safe Markdown Parsing");
      addTestResult("should map **bold** to STRONG elements via DocumentFragment", () => {
        const frag = parseInlineMarkdown("This is **bold** text with *italic*");
        assert(frag instanceof DocumentFragment, "Must return DocumentFragment");
        assert.strictEqual(frag.childNodes.length, 4);
        assert.strictEqual(frag.childNodes[1].nodeName, "STRONG");
        assert.strictEqual(frag.childNodes[3].nodeName, "EM");
      });
      addTestResult("should parse paragraphs and bullet lists into semantic HTML", () => {
        const frag = parseMarkdownToElements("Hello.\n\n- Item 1\n- Item 2\n\nEnd.");
        assert(frag instanceof DocumentFragment);
        assert.strictEqual(frag.childNodes.length, 3);
        assert.strictEqual(frag.childNodes[0].nodeName, "P");
        assert.strictEqual(frag.childNodes[1].nodeName, "UL");
        assert.strictEqual(frag.childNodes[1].childNodes.length, 2);
        assert.strictEqual(frag.childNodes[2].nodeName, "P");
      });

      addSectionHeader("Config Module");
      addTestResult("EXAMS should contain all required competitive exams", () => {
        const ids = EXAMS.map(e => e.id);
        assert(ids.includes("jee"), "Missing JEE");
        assert(ids.includes("neet"), "Missing NEET");
        assert(ids.includes("upsc"), "Missing UPSC");
        assert(ids.includes("gate"), "Missing GATE");
      });
      addTestResult("getExamName should resolve IDs to human-readable names", () => {
        assert.strictEqual(getExamName("jee"), "JEE (Engineering)");
        assert.strictEqual(getExamName("neet"), "NEET (Medical)");
        assert.strictEqual(getExamName("unknown"), "unknown");
      });
      addTestResult("buildAnalysisPrompt should include all student context", () => {
        const p = buildAnalysisPrompt("stressed", "stressed", "JEE", 10);
        assert(p.includes("JEE"), "Must include exam");
        assert(p.includes("10"), "Must include hours");
        assert(p.includes("stressScore"), "Must request stressScore");
        assert(p.includes("copingStrategies"), "Must request coping");
      });
      addTestResult("buildCompanionSystemPrompt should reference Aura and safety", () => {
        const p = buildCompanionSystemPrompt("GATE", "overwhelmed", "summary");
        assert(p.includes("Aura"), "Must reference Aura");
        assert(p.includes("GATE"), "Must include exam");
        assert(p.toLowerCase().includes("self-harm") || p.toLowerCase().includes("crisis"));
      });

      addSectionHeader("Defensive Input Types");
      addTestResult("should handle null, undefined, and numbers safely without throwing", () => {
        assert.strictEqual(validateUrl(null), false);
        assert.strictEqual(validateJournal(undefined), false);
        assert.strictEqual(escapeHtml(123), "");
        assert.strictEqual(extractJsonString(null), "");
        assert.strictEqual(sanitizeJournalInput(null), "");
        assert.strictEqual(parseInlineMarkdown(null).childNodes.length, 0);
        assert.strictEqual(parseMarkdownToElements(null).childNodes.length, 0);
      });

      summaryBadge.textContent = failedTests === 0 ? `All ${totalTests} Passed` : `${failedTests} Failed`;
      summaryBadge.className = `test-summary-badge ${failedTests === 0 ? "all-passed" : "has-failed"}`;
    }

    runBtn.addEventListener("click", runTests);
    runTests();
  </script>
</body>
</html>
